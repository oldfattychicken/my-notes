name: Sync NutStore & Deploy GitHub Pages

# 触发条件：每5分钟自动执行 + 手动触发
on:
  schedule:
    - cron: "*/5 * * * *" # 每5分钟拉一次坚果云笔记
  workflow_dispatch: # 手动触发按钮（在GitHub Actions页面可见）

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 赋予部署GitHub Pages的权限
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 步骤1：拉取GitHub仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤2：安装WebDAV工具（用于访问坚果云）
      - name: Install cadaver (WebDAV client)
        run: sudo apt update && sudo apt install -y cadaver

      # 步骤3：从坚果云拉取笔记到docs目录
      - name: Sync notes from NutStore
        run: |
          # 清空并重建docs目录
          rm -rf docs && mkdir -p docs

          # 编写标准的WebDAV同步脚本
          cat > sync.nut << EOF
          # 1. 连接坚果云WebDAV服务器
          open https://dav.jianguoyun.com/dav/
          # 2. 输入账号（WEBDAV_USER）
          user ${{ secrets.WEBDAV_USER }}
          # 3. 输入密码（WEBDAV_PASS）
          pass ${{ secrets.WEBDAV_PASS }}
          # 4. 切换到坚果云笔记目录
          cd ${{ secrets.WEBDAV_PATH }}
          # 5. 本地切换到docs目录
          lcd docs
          # 6. 递归下载所有文件和子文件夹
          mget -r *
          # 7. 退出
          quit
          EOF

          # 执行同步（仅保留-t参数，移除不兼容的--quiet）
          echo "开始连接坚果云WebDAV并同步笔记..."
          cadaver -t < sync.nut

          # 验证同步结果
          echo "同步完成，docs目录内容："
          ls -la docs/ || echo "docs目录为空，请检查同步配置！"

      # 步骤4：安装Node.js和依赖
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 指定Node版本
          cache: "npm" # 缓存npm依赖，加速构建

      - name: Install dependencies
        run: npm install

      # 步骤5：构建VitePress
      - name: Build VitePress site
        run: npm run docs:build

      # 步骤6：上传构建产物
      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # VitePress构建后的目录

      # 步骤7：部署到GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
